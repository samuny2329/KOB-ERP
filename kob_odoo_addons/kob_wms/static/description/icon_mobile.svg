<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#714B67"/>
      <stop offset="100%" stop-color="#57344F"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#gradBg)"/>
  <!-- Phone outline -->
  <rect x="32" y="18" width="36" height="64" rx="6" fill="#fff" stroke="#fff" stroke-width="2"/>
  <rect x="36" y="24" width="28" height="44" rx="2" fill="#714B67"/>
  <!-- Speaker -->
  <rect x="44" y="20" width="12" height="2" rx="1" fill="#714B67"/>
  <!-- Home button -->
  <circle cx="50" cy="76" r="3" fill="#714B67"/>
  <!-- Barcode lines on screen -->
  <g fill="#fff">
    <rect x="40" y="32" width="2" height="20"/>
    <rect x="44" y="32" width="3" height="20"/>
    <rect x="49" y="32" width="1" height="20"/>
    <rect x="52" y="32" width="3" height="20"/>
    <rect x="57" y="32" width="2" height="20"/>
    <rect x="60" y="32" width="1" height="20"/>
  </g>
  <!-- Scan beam (angled) -->
  <line x1="36" y1="58" x2="64" y2="58" stroke="#FF5252" stroke-width="2" stroke-linecap="round"/>
</svg>
