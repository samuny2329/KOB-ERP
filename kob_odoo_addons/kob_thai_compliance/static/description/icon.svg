<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#g)"/>
  <!-- Thai 'ภ' character (compliance) -->
  <text x="128" y="180" text-anchor="middle"
        font-family="'Sarabun', 'Noto Sans Thai', sans-serif"
        font-size="160" font-weight="700" fill="#fff">ภ</text>
  <!-- Small Thailand flag stripe at bottom -->
  <rect x="56" y="208" width="144" height="6" fill="#ce1126"/>
  <rect x="56" y="214" width="144" height="6" fill="#fff"/>
  <rect x="56" y="220" width="144" height="6" fill="#0d2c80"/>
</svg>
